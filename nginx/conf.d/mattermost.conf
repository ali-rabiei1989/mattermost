limit_req_zone $binary_remote_addr zone=mm_rl:10m rate=30r/s;

# WebSocket upgrade helper
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name chat.example.com;

  # LetsEncrypt HTTP-01 challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name chat.example.com;

  # Local/self-signed OR copied LetsEncrypt certs
  ssl_certificate     /etc/nginx/ssl/mattermost.crt;
  ssl_certificate_key /etc/nginx/ssl/mattermost.key;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy no-referrer always;
  add_header Permissions-Policy "geolocation=()" always;

  client_max_body_size 100M;

  location / {
    limit_req zone=mm_rl burst=60 nodelay;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    proxy_pass http://mattermost:8065;
  }
}
